<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Shower Amelia</title>
  <style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* Contenedor principal */
    .container {
      height: 100%;
      width: 100%;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }

    /* Cada pantalla */
    section {
      height: 100vh;
      width: 100%;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
      text-align: center;
    }

    /* Colores diferentes para distinguir */
    #welcome { background: #f8b195; color: #fff; }
    #message { background: #f67280; color: #fff; }
    #location { background: #c06c84; color: #fff; }
    #gifts { background: #6c5b7b; color: #fff; }
    #rsvp { background: #355c7d; color: #fff; }

    /* Botones de navegación */
    .nav-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.7);
      border: none;
      padding: 10px 15px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <section id="welcome">Bienvenida<br>Baby Shower Amelia</section>
    <section id="message">Mensaje de amor + Foto</section>
    <section id="location">Lugar y fecha del evento</section>
    <section id="gifts">Mesa de regalos</section>
    <section id="rsvp">Confirma tu asistencia</section>
  </div>

  <button class="nav-btn" id="nextBtn">Siguiente</button>

  <script>
    const sections = document.querySelectorAll('section');
    const nextBtn = document.getElementById('nextBtn');
    let current = 0;

    nextBtn.addEventListener('click', () => {
      current++;
      if(current >= sections.length) current = sections.length - 1;
      sections[current].scrollIntoView({ behavior: 'smooth' });
    });

    // Opcional: scroll con wheel o touch
    let isScrolling = false;
    document.querySelector('.container').addEventListener('wheel', (e) => {
      if(isScrolling) return;
      isScrolling = true;
      if(e.deltaY > 0) current++;
      else current--;
      if(current < 0) current = 0;
      if(current >= sections.length) current = sections.length - 1;
      sections[current].scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => { isScrolling = false; }, 500);
    });
  </script>

</body>
</html>
