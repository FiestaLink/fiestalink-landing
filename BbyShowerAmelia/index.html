<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower Amelia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #e8f1e4, #d8e6d3);
  font-family: 'Montserrat', sans-serif;
  text-align: center;
  color: #2f3e2e;
  overflow-x: hidden;
}

.container {
  padding: 40px 20px;
  max-width: 600px;
  margin: auto;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  margin-bottom: 10px;
}

h2 {
  font-weight: 300;
  margin-top: 0;
  margin-bottom: 30px;
}

.section {
  margin: 40px 0;
  line-height: 1.6;
  font-size: 1.1rem;
}

.mesa-regalos {
  margin-top: 40px;
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
}

/* SLIDESHOW ARTÍSTICO */
.slideshow {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 40px auto 0;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  border: 6px solid #dbe8d3;
}

.slideshow::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(40,60,40,0.1);
  mix-blend-mode: multiply;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transform: translateX(-100%);
  transition: all 1.5s ease;
  filter: contrast(105%) saturate(105%);
}

.slide.active {
  opacity: 1;
  transform: translateX(0);
}

/* FLOTA DORES SUAVES */
.floating {
  position: fixed;
  bottom: -50px;
  font-size: 20px;
  opacity: 0.3;
  animation: floatUp 25s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(-110vh);
  }
}

</style>
</head>

<body>

<div class="container">

  <h1>Baby Shower</h1>
  <h2>Amelia</h2>

  <div class="section">
    Te invitamos con mucho amor a celebrar la llegada de nuestra pequeña Amelia
  </div>

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <img src="foto1.jpg" class="slide active">
    <img src="foto2.jpg" class="slide">
    <img src="foto3.jpg" class="slide">
  </div>

  <div class="section">
    Fecha: 20 de Abril<br>
    Hora: 4:00 PM<br>
    Lugar: Casa de los abuelos
  </div>

  <h1 class="mesa-regalos">Mesa de regalos</h1>

</div>

<!-- SCRIPT SLIDESHOW -->
<script>
const slides = document.querySelectorAll(".slide");
let current = 0;

setInterval(() => {

  slides[current].classList.remove("active");
  slides[current].style.transform = "translateX(100%)";

  current = (current + 1) % slides.length;

  slides[current].style.transform = "translateX(-100%)";

  setTimeout(() => {
    slides[current].classList.add("active");
  }, 100);

}, 4000);
</script>

<!-- FLOTA DORES SUAVES -->
<script>
const symbols = ["🌿","🍃","🤍"];
function createFloating() {
  const span = document.createElement("span");
  span.classList.add("floating");
  span.style.left = Math.random() * 100 + "vw";
  span.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
  document.body.appendChild(span);

  setTimeout(() => {
    span.remove();
  }, 25000);
}

setInterval(createFloating, 6000);
</script>

</body>
</html>
