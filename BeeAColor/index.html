<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee A Color 🐝</title>

<style>
body { margin:0; font-family:sans-serif; overflow:hidden; }

.top-bar, .bottom-bar {
  position:fixed; width:100%; height:40px;
  background:#f4c430; display:flex; align-items:center;
  justify-content:center; z-index:10;
}
.top-bar{top:0;} .bottom-bar{bottom:0;}

#container {
  scroll-snap-type:y mandatory;
  overflow-y:scroll;
  height:100vh;
}

.panel {
  min-height:calc(100vh - 80px);
  scroll-snap-align:start;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 20px; gap:20px;
}

.welcome{background:#fff8dc;}
.category{background:#fdf6e3;}
.social{background:#e8f5e9;}

/* 🔥 MÁS RÁPIDO */
.slider-track {
  display:flex;
  animation:scroll 6s linear infinite;
}

.slide img {
  width:200px; height:200px;
  object-fit:cover;
  margin:0 10px;
  border-radius:10px;
}

/* GALERÍA */
.dual-gallery {
  display:flex;
  gap:20px;
  width:100%;
  justify-content:center;
}

.fade-box {
  width:45%;
  text-align:center;
}

.fade-box img {
  width:100%;
  max-width:220px;
  height:220px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  opacity:1;
  transition:opacity 0.8s;
}

button {
  background:#f4c430;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  max-width:90%;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  color:white;
  background:black;
  padding:8px 12px;
  border-radius:50%;
  cursor:pointer;
}

@keyframes scroll {
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
</style>
</head>

<body>

<div class="top-bar">🐝 Bee A Color</div>
<div class="bottom-bar">Acuarelas únicas 🎨</div>

<div id="container">

<section class="panel welcome">
  <h1>Bee A Color 🐝</h1>
  <div class="slider">
    <div class="slider-track" id="welcome-slider"></div>
  </div>
</section>

<div id="dynamic-sections"></div>

<section class="panel social">
  <h2>Síguenos</h2>
  <button onclick="window.open('https://instagram.com','_blank')">Instagram</button>
</section>

</div>

<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">✕</span>
  <div class="modal-content">
    <img id="modal-img">
    <p id="modal-desc"></p>
  </div>
</div>

<script>

async function loadCSV() {
  const res = await fetch('input.csv');
  const text = await res.text();

  const data = text.split('\n').slice(1)
    .map(r=>r.trim()).filter(r=>r)
    .map(r=>{
      const c=r.split(',');
      if(c.length<4) return null;
      return {categoria:c[0],descripcion:c[2],path:c[3]};
    }).filter(x=>x);

  buildWelcome(data);
  buildSections(data);
}

/* BIENVENIDA */
function buildWelcome(data){
  const track=document.getElementById('welcome-slider');

  const slides=data.map(item=>{
    const div=document.createElement('div');
    div.className='slide';

    const img=document.createElement('img');
    img.src=`assets/img/${item.path}`;

    div.appendChild(img);
    return div;
  });

  slides.forEach(s=>track.appendChild(s));
  slides.forEach(s=>track.appendChild(s.cloneNode(true)));
}

/* SECCIONES */
function buildSections(data){
  const container=document.getElementById('dynamic-sections');

  const cats={};
  data.forEach(d=>{
    if(!cats[d.categoria]) cats[d.categoria]=[];
    cats[d.categoria].push(d);
  });

  Object.keys(cats).forEach(cat=>{

    const section=document.createElement('section');
    section.className='panel category';

    const title=document.createElement('h2');
    title.innerText=cat;

    const gallery=document.createElement('div');
    gallery.className='dual-gallery';

    const left=createFadeBox();
    const right=createFadeBox();

    gallery.appendChild(left.box);
    gallery.appendChild(right.box);

    /* 🔥 CONTROL CENTRALIZADO */
    let index=0;

    function update(){
      left.fade();
      right.fade();

      setTimeout(()=>{
        const a=cats[cat][index];
        const b=cats[cat][(index+1)%cats[cat].length];

        left.set(a);
        right.set(b);

        index=(index+1)%cats[cat].length;

        left.show();
        right.show();

      },400);
    }

    update();
    setInterval(update,3000);

    const btn=document.createElement('button');
    btn.innerText='Cotiza';

    section.appendChild(title);
    section.appendChild(gallery);
    section.appendChild(btn);

    container.appendChild(section);
  });
}

/* FADE BOX FACTORY */
function createFadeBox(){
  const box=document.createElement('div');
  box.className='fade-box';

  const img=document.createElement('img');
  const desc=document.createElement('p');

  box.appendChild(img);
  box.appendChild(desc);

  return {
    box,
    fade:()=> img.style.opacity=0,
    show:()=> img.style.opacity=1,
    set:(item)=>{
      img.src=`assets/img/${item.path}`;
      desc.innerText=item.descripcion;
      img.onclick=()=>openModal(img.src,item.descripcion);
    }
  };
}

/* MODAL */
function openModal(src,desc){
  document.getElementById('modal').style.display='flex';
  document.getElementById('modal-img').src=src;
  document.getElementById('modal-desc').innerText=desc;
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

window.onclick=e=>{
  if(e.target.id==='modal') closeModal();
};

loadCSV();

</script>

</body>
</html>
