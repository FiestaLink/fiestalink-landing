<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bee A Color 🐝</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* CINTAS */
    .top-bar, .bottom-bar {
      position: fixed;
      width: 100%;
      height: 40px;
      background: #f4c430;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .top-bar { top: 0; }
    .bottom-bar { bottom: 0; }

    /* CONTENEDOR */
    #container {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100vh;
    }

    /* PANELES */
    .panel {
      min-height: calc(100vh - 80px); /* 🔥 mejor para móvil */
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      box-sizing: border-box;
      gap: 10px;
    }

    .welcome { background: #fff8dc; }
    .social { background: #e8f5e9; }
    .category { background: #fdf6e3; }

    /* SLIDER */
    .slider {
      width: 90%;
      overflow: hidden;
      margin: 10px 0;
    }

    .slider-track {
      display: flex;
      animation: scroll linear infinite;
    }

    .fast { animation-duration: 10s; }
    .slow { animation-duration: 35s; }

    .slide {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 10px;
    }

    /* 🔥 tamaño unificado */
    .slide img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .slide p {
      margin-top: 5px;
      font-size: 14px;
      text-align: center;
      max-width: 200px;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    button {
      background: #f4c430;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
      border-radius: 10px;
      margin-top: auto; /* 🔥 lo baja pero sin perder accesibilidad */
    }

  </style>
</head>

<body>

<div class="top-bar">🐝 Bee A Color</div>
<div class="bottom-bar">Acuarelas únicas hechas con amor 🎨</div>

<div id="container">

  <!-- BIENVENIDA -->
  <section class="panel welcome">
    <h1>Bienvenido a Bee A Color 🐝</h1>
    <p>Acuarelas originales, hechas a mano</p>

    <div class="slider">
      <div class="slider-track fast" id="welcome-slider"></div>
    </div>
  </section>

  <!-- DINÁMICO -->
  <div id="dynamic-sections"></div>

  <!-- REDES -->
  <section class="panel social">
    <h2>Síguenos</h2>
    <button onclick="window.open('https://instagram.com','_blank')">Instagram</button>
  </section>

</div>

<script>

async function loadCSV() {
  const response = await fetch('input.csv');
  const data = await response.text();

  const rows = data.split('\n').slice(1);

  const parsed = rows
    .map(row => row.trim())
    .filter(row => row !== "")
    .map(row => {
      const cols = row.split(',');

      if (cols.length < 4) return null;

      return {
        categoria: cols[0]?.trim(),
        titulo: cols[1]?.trim(),
        descripcion: cols[2]?.trim(),
        path: cols[3]?.trim()
      };
    })
    .filter(item => item !== null);

  buildWelcomeSlider(parsed);
  buildSections(parsed);
}

function buildWelcomeSlider(data) {
  const container = document.getElementById('welcome-slider');

  data.forEach(item => {
    const slide = document.createElement('div');
    slide.className = 'slide';

    const img = document.createElement('img');
    img.src = `assets/img/${item.path}`;

    slide.appendChild(img);
    container.appendChild(slide);
  });

  container.innerHTML += container.innerHTML;
}

function buildSections(data) {

  const container = document.getElementById('dynamic-sections');
  const categorias = {};

  data.forEach(item => {
    if (!categorias[item.categoria]) {
      categorias[item.categoria] = [];
    }
    categorias[item.categoria].push(item);
  });

  Object.keys(categorias).forEach(cat => {

    const section = document.createElement('section');
    section.className = 'panel category';

    const title = document.createElement('h2');
    title.innerText = cat;

    const slider = document.createElement('div');
    slider.className = 'slider';

    const track = document.createElement('div');
    track.className = 'slider-track slow';

    categorias[cat].forEach(item => {

      const slide = document.createElement('div');
      slide.className = 'slide';

      const img = document.createElement('img');
      img.src = `assets/img/${item.path}`;

      const desc = document.createElement('p');
      desc.innerText = item.descripcion;

      slide.appendChild(img);
      slide.appendChild(desc);

      track.appendChild(slide);
    });

    track.innerHTML += track.innerHTML;

    slider.appendChild(track);

    const btn = document.createElement('button');
    btn.innerText = 'Cotiza';
    btn.onclick = () => {
      alert('Contacto para cotización');
    };

    section.appendChild(title);
    section.appendChild(slider);
    section.appendChild(btn);

    container.appendChild(section);
  });
}

loadCSV();

</script>

</body>
</html>
