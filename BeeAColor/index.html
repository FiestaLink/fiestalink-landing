<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bee A Color 🐝</title>
  <style>
    body {
    margin: 0;
    font-family: sans-serif;
    overflow: hidden;
    }

    /* CINTAS */
    .top-bar, .bottom-bar {
    position: fixed;
    width: 100%;
    height: 40px;
    background: #f4c430;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    }

    .top-bar { top: 0; }
    .bottom-bar { bottom: 0; }

    /* CONTENEDOR */
    #container {
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    height: 100vh;
    }

    /* PANELES */
    .panel {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 40px;
    padding-bottom: 40px;
    }

    /* COLORES TEMA ABEJA */
    .welcome {
    background: #fff8dc;
    }

    .social {
    background: #e8f5e9;
    }

    /* CATEGORIAS */
    .category {
    background: #fdf6e3;
    }

    /* SLIDER */
    .slider {
    width: 80%;
    overflow: hidden;
    margin: 20px 0;
    }

    .slider-track {
    display: flex;
    animation: scroll 20s linear infinite;
    }

    .slider img {
    width: 200px;
    margin: 0 10px;
    border-radius: 10px;
    }

    /* ANIMACION */
    @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
    }

    /* BOTON */
    button {
    background: #f4c430;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 10px;
    }
   </style>
</head>
<body>

<!-- CINTAS FIJAS -->
<div class="top-bar">🐝 Bee A Color</div>
<div class="bottom-bar">Acuarelas únicas hechas con amor 🎨</div>

<!-- CONTENEDOR -->
<div id="container">

  <!-- BIENVENIDA -->
  <section class="panel welcome">
    <h1>Bienvenido a Bee A Color 🐝</h1>
    <p>Acuarelas originales, hechas a mano</p>
  </section>

  <!-- SECCIONES DINÁMICAS -->
  <div id="dynamic-sections"></div>

  <!-- REDES -->
  <section class="panel social">
    <h2>Síguenos</h2>
    <button onclick="window.open('https://instagram.com','_blank')">Instagram</button>
  </section>

</div>

<script>
        async function loadCSV() {
    const response = await fetch('input.csv');
    const data = await response.text();

    const rows = data.split('\n').slice(1);
    const parsed = rows.map(row => {
        const cols = row.split(',');
        return {
        categoria: cols[0],
        titulo: cols[1],
        descripcion: cols[2],
        path: cols[3]
        };
    });

    buildSections(parsed);
    }

    function buildSections(data) {
    const container = document.getElementById('dynamic-sections');

    // Agrupar por categoría
    const categorias = {};

    data.forEach(item => {
        if (!categorias[item.categoria]) {
        categorias[item.categoria] = [];
        }
        categorias[item.categoria].push(item);
    });

    // Crear secciones
    Object.keys(categorias).forEach(cat => {

        const section = document.createElement('section');
        section.className = 'panel category';

        const title = document.createElement('h2');
        title.innerText = cat;

        const slider = document.createElement('div');
        slider.className = 'slider';

        const track = document.createElement('div');
        track.className = 'slider-track';

        categorias[cat].forEach(item => {
        const img = document.createElement('img');
        img.src = `assets/img/${item.path}`;
        track.appendChild(img);
        });

        // duplicar para efecto infinito
        track.innerHTML += track.innerHTML;

        slider.appendChild(track);

        const desc = document.createElement('p');
        desc.innerText = categorias[cat][0].descripcion;

        const btn = document.createElement('button');
        btn.innerText = 'Cotiza';
        btn.onclick = () => {
        alert('Contacto para cotización');
        };

        section.appendChild(title);
        section.appendChild(slider);
        section.appendChild(desc);
        section.appendChild(btn);

        container.appendChild(section);
    });
    }

    loadCSV();
</script>
</body>

</html>
