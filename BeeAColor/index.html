<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bee A Color 🐝</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    .top-bar, .bottom-bar {
      position: fixed;
      width: 100%;
      height: 40px;
      background: #f4c430;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .top-bar { top: 0; }
    .bottom-bar { bottom: 0; }

    #container {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100vh;
    }

    .panel {
      min-height: calc(100vh - 80px);
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 10px;
    }

    .welcome { background: #fff8dc; }
    .category { background: #fdf6e3; }
    .social { background: #e8f5e9; }

    .slider {
      width: 90%;
      overflow: hidden;
    }

    .slider-track {
      display: flex;
      animation: scroll linear infinite;
    }

    .fast { animation-duration: 10s; }
    .slow { animation-duration: 35s; }

    .slide {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0 10px;
      cursor: pointer;
    }

    .slide img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .slide p {
      font-size: 14px;
      text-align: center;
      max-width: 200px;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    button {
      background: #f4c430;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      max-width: 90%;
    }

    .modal img {
      max-width: 100%;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="top-bar">🐝 Bee A Color</div>
<div class="bottom-bar">Acuarelas únicas hechas con amor 🎨</div>

<div id="container">

  <section class="panel welcome">
    <h1>Bienvenido a Bee A Color 🐝</h1>
    <p>Acuarelas originales</p>

    <div class="slider">
      <div class="slider-track fast" id="welcome-slider"></div>
    </div>
  </section>

  <div id="dynamic-sections"></div>

  <section class="panel social">
    <h2>Síguenos</h2>
    <button onclick="window.open('https://instagram.com','_blank')">Instagram</button>
  </section>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <div class="modal-content">
    <img id="modal-img">
    <p id="modal-desc"></p>
  </div>
</div>

<script>

async function loadCSV() {
  const res = await fetch('input.csv');
  const text = await res.text();

  const data = text.split('\n').slice(1)
    .map(r => r.trim())
    .filter(r => r)
    .map(r => {
      const c = r.split(',');
      if (c.length < 4) return null;
      return {
        categoria: c[0],
        descripcion: c[2],
        path: c[3]
      };
    })
    .filter(x => x);

  buildWelcome(data);
  buildSections(data);
}

/* BIENVENIDA */
function buildWelcome(data) {
  const track = document.getElementById('welcome-slider');

  const slides = data.map(item => {
    const s = document.createElement('div');
    s.className = 'slide';

    const img = document.createElement('img');
    img.src = `assets/img/${item.path}`;

    s.appendChild(img);
    return s;
  });

  slides.forEach(s => track.appendChild(s));

  slides.forEach(s => track.appendChild(s.cloneNode(true))); // 🔥 correcto
}

/* SECCIONES */
function buildSections(data) {
  const container = document.getElementById('dynamic-sections');

  const cats = {};
  data.forEach(d => {
    if (!cats[d.categoria]) cats[d.categoria] = [];
    cats[d.categoria].push(d);
  });

  Object.keys(cats).forEach(cat => {

    const section = document.createElement('section');
    section.className = 'panel category';

    const title = document.createElement('h2');
    title.innerText = cat;

    const track = document.createElement('div');
    track.className = 'slider-track slow';

    const slider = document.createElement('div');
    slider.className = 'slider';

    const slides = cats[cat].map(item => {

      const s = document.createElement('div');
      s.className = 'slide';

      const img = document.createElement('img');
      img.src = `assets/img/${item.path}`;

      const desc = document.createElement('p');
      desc.innerText = item.descripcion;

      const open = () => openModal(img.src, item.descripcion);

      s.addEventListener('click', open);
      s.addEventListener('touchstart', open);

      s.appendChild(img);
      s.appendChild(desc);

      return s;
    });

    slides.forEach(s => track.appendChild(s));

    // 🔥 duplicar SIN romper eventos
    slides.forEach(s => {
      const clone = s.cloneNode(true);

      clone.addEventListener('click', () => {
        const img = clone.querySelector('img').src;
        const desc = clone.querySelector('p').innerText;
        openModal(img, desc);
      });

      clone.addEventListener('touchstart', () => {
        const img = clone.querySelector('img').src;
        const desc = clone.querySelector('p').innerText;
        openModal(img, desc);
      });

      track.appendChild(clone);
    });

    slider.appendChild(track);

    const btn = document.createElement('button');
    btn.innerText = 'Cotiza';

    section.appendChild(title);
    section.appendChild(slider);
    section.appendChild(btn);

    container.appendChild(section);
  });
}

/* MODAL */
function openModal(src, desc) {
  const m = document.getElementById('modal');
  m.style.display = 'flex';
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-desc').innerText = desc;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

window.onclick = e => {
  if (e.target.id === 'modal') closeModal();
};

loadCSV();

</script>

</body>
</html>
